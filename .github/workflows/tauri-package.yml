name: tauri-package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            platform: windows-latest
            mobile: ""
            tauri_args: ""
            artifact_name: fashion-windows
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: linux
            platform: ubuntu-22.04
            mobile: ""
            tauri_args: ""
            artifact_name: fashion-linux
            artifact_path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
          - name: android
            platform: ubuntu-22.04
            mobile: android
            tauri_args: --apk --debug --ci --target aarch64
            artifact_name: fashion-android-apk
            artifact_path: |
              src-tauri/gen/android/app/build/outputs/apk/**/*.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        if: matrix.mobile != 'android'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with Android target
        if: matrix.mobile == 'android'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        if: matrix.mobile == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.mobile == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Linux system dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android target
        if: matrix.mobile == 'android'
        run: npm run tauri -- android init --ci

      - name: Build release packages
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Fashion ${{ github.ref_name }}
          releaseBody: Automated build for Fashion.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          mobile: ${{ matrix.mobile }}
          args: ${{ matrix.tauri_args }}

      - name: Build workflow packages
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v1
        with:
          mobile: ${{ matrix.mobile }}
          args: ${{ matrix.tauri_args }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
